name: Release version to prolifel/homebrew-tap

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: |
          xcodebuild -project Klipi.xcodeproj \
            -scheme Klipi \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          hdiutil create -volname "Klipi" \
            -srcfolder "build/Build/Products/Release/Klipi.app" \
            -ov -format UDZO "Klipi-${{ github.ref_name }}.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: klipi-dmg
          path: Klipi-*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: klipi-dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Klipi-*.dmg
          generate_release_notes: true

  bump:
    needs: [build, release]
    runs-on: ubuntu-latest
    env:
      TAP_REPO: prolifel/homebrew-tap
      CASK_PATH: Casks/klipi.rb

    concurrency:
      group: cask-update
      cancel-in-progress: false

    steps:
      - name: Get version from tag
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG for checksum
        uses: actions/download-artifact@v4
        with:
          name: klipi-dmg

      - name: Compute sha256
        id: sha
        run: |
          SHA256="$(shasum -a 256 "Klipi-${{ steps.meta.outputs.version }}.dmg" | cut -d' ' -f1)"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Checkout tap (write-enabled)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          ref: main
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          persist-credentials: false

      - name: Update cask url/sha256
        run: |
          set -euo pipefail
          export VERSION="${{ steps.meta.outputs.version }}"
          export SHA256="${{ steps.sha.outputs.sha256 }}"
          : "${VERSION:?missing VERSION}"
          : "${SHA256:?missing SHA256}"
          perl -0777 -pe '
            s{^(\s*version\s*")[^\"]*(")}{$1 . $ENV{VERSION} . $2}me;
            s{^(\s*sha256\s*")[^\"]*(")}{$1 . $ENV{SHA256} . $2}me;
          ' -i "${CASK_PATH}"
          grep -En '^\s*(version|sha256)\s*"' "${CASK_PATH}"

      - name: Commit & push to main
        env:
          GH_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GH_NAME: github-actions[bot]
        run: |
          set -euo pipefail
          git config user.email "$GH_EMAIL"
          git config user.name "$GH_NAME"
          if git diff --quiet -- "${CASK_PATH}"; then
            echo "No changes to commit; skipping push."
            exit 0
          fi
          git add "${CASK_PATH}"
          git commit -m "klipi ${{ steps.meta.outputs.version }}: bump cask"
          git remote set-url origin "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ env.TAP_REPO }}.git"
          git pull --rebase origin main
          git push origin HEAD:main
